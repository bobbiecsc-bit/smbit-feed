<!--
  SMALL BUSINESS IT FEED — WordPress Custom HTML Block
  ======================================================
  Change ONE line before publishing:
    const FEED_BASE = 'https://YOUR-SMBIT-PROJECT.vercel.app';

  Categories: infrastructure · cloud/saas · finance · continuity · policy
-->

<div id="smb-feed">

  <!--
  <div class="smb-ad-banner">YOUR AD CODE HERE</div>
  -->

  <div class="smb-header">
    <h2 class="smb-title">Small Business IT</h2>
    <p class="smb-subtitle">Practical technology news for small and family businesses · Updated twice daily</p>

    <div class="smb-tabs" id="smb-tabs" role="tablist">
      <button class="smb-tab smb-tab--active" data-cat="all"            role="tab" aria-pressed="true">All</button>
      <button class="smb-tab"                  data-cat="infrastructure" role="tab" aria-pressed="false">Infrastructure</button>
      <button class="smb-tab"                  data-cat="cloud_saas"     role="tab" aria-pressed="false">Cloud &amp; SaaS</button>
      <button class="smb-tab"                  data-cat="finance"        role="tab" aria-pressed="false">Budgeting</button>
      <button class="smb-tab"                  data-cat="continuity"     role="tab" aria-pressed="false">Continuity / DR</button>
      <button class="smb-tab"                  data-cat="policy"         role="tab" aria-pressed="false">Policy &amp; Compliance</button>
    </div>

    <input id="smb-search" class="smb-search" type="search"
           placeholder="Search articles…"
           aria-label="Search small business IT news" />
  </div>

  <div id="smb-list" role="feed" aria-label="Small business IT news">
    <p class="smb-status">Loading…</p>
  </div>

  <nav class="smb-pagination" id="smb-pagination" aria-label="Feed pages">
    <button class="smb-page-btn" id="smb-prev" disabled>← Previous</button>
    <span class="smb-page-info" id="smb-page-info"></span>
    <button class="smb-page-btn" id="smb-next" disabled>Next →</button>
  </nav>

  <p class="smb-footer">
    <span id="smb-updated"></span>
    <span aria-hidden="true"> · </span>
    <a id="smb-feedlink" href="#" target="_blank" rel="noopener noreferrer">Feed source</a>
    <span aria-hidden="true"> · </span>
    Links open the original article on the source site.
  </p>

</div>

<style>
#smb-feed { max-width: 800px; margin: 0 auto; }
#smb-feed .smb-ad-banner { margin-bottom: 1.5em; text-align: center; }
#smb-feed .smb-title  { margin: 0 0 0.2em; }
#smb-feed .smb-subtitle { margin: 0 0 1em; font-size: 0.82em; opacity: 0.65; }
#smb-feed .smb-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.75em; }
#smb-feed .smb-tab {
  background: transparent; border: 1px solid currentColor; border-radius: 3px;
  padding: 4px 12px; font-size: 0.78em; font-weight: 600; cursor: pointer;
  opacity: 0.5; transition: opacity 0.15s; color: inherit; font-family: inherit;
}
#smb-feed .smb-tab:hover { opacity: 0.8; }
#smb-feed .smb-tab--active { opacity: 1; background: rgba(0,0,0,0.06); }
#smb-feed .smb-search {
  width: 100%; padding: 7px 10px; font-size: 0.88em; font-family: inherit;
  border: 1px solid rgba(0,0,0,0.2); border-radius: 3px;
  background: transparent; color: inherit; margin-bottom: 1.1em; box-sizing: border-box;
}
#smb-feed .smb-search:focus { outline: 2px solid currentColor; outline-offset: 1px; }

#smb-feed #smb-list { margin: 0; padding: 0; }
#smb-feed .smb-item {
  display: flex; flex-direction: column; gap: 4px;
  padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.1);
}
#smb-feed .smb-item:last-child { border-bottom: none; }
#smb-feed .smb-item-title {
  font-size: 0.97em; font-weight: 600; line-height: 1.4; text-decoration: none;
}
#smb-feed .smb-item-title:hover { text-decoration: underline; }
#smb-feed .smb-item-meta {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  font-size: 0.75em; opacity: 0.7;
}
#smb-feed .smb-source { font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
#smb-feed .smb-cat {
  display: inline-block; padding: 1px 7px; border-radius: 2px;
  font-size: 0.9em; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
}
#smb-feed .smb-cat--infrastructure { background:#e8f0fe; color:#1a5fb0; }
#smb-feed .smb-cat--cloud_saas     { background:#e8f8f0; color:#1a7a46; }
#smb-feed .smb-cat--finance        { background:#fef9e0; color:#7a6000; }
#smb-feed .smb-cat--continuity     { background:#fef0e0; color:#9a5000; }
#smb-feed .smb-cat--policy         { background:#f0e8fc; color:#6a0aad; }
#smb-feed .smb-item-summary {
  font-size: 0.84em; line-height: 1.5; opacity: 0.75;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
#smb-feed .smb-pagination {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-top: 1.4em; padding-top: 1em;
  border-top: 1px solid rgba(0,0,0,0.1);
}
#smb-feed .smb-page-btn {
  background: transparent; border: 1px solid currentColor; border-radius: 3px;
  padding: 6px 16px; font-size: 0.82em; font-weight: 600; cursor: pointer;
  color: inherit; font-family: inherit; opacity: 0.7; transition: opacity 0.15s;
}
#smb-feed .smb-page-btn:hover:not(:disabled) { opacity: 1; }
#smb-feed .smb-page-btn:disabled { opacity: 0.25; cursor: default; }
#smb-feed .smb-page-info { font-size: 0.8em; opacity: 0.6; text-align: center; flex: 1; }
#smb-feed .smb-status { padding: 2em 0; text-align: center; opacity: 0.55; font-size: 0.9em; }
#smb-feed .smb-footer { margin-top: 1em; font-size: 0.75em; opacity: 0.55; }

@media (prefers-color-scheme: dark) {
  #smb-feed .smb-tab--active  { background: rgba(255,255,255,0.08); }
  #smb-feed .smb-search       { border-color: rgba(255,255,255,0.2); }
  #smb-feed .smb-item         { border-bottom-color: rgba(255,255,255,0.1); }
  #smb-feed .smb-pagination   { border-top-color: rgba(255,255,255,0.1); }
  #smb-feed .smb-cat--infrastructure { background:#0a1a3d; color:#7aadff; }
  #smb-feed .smb-cat--cloud_saas     { background:#0a2a1a; color:#5adba0; }
  #smb-feed .smb-cat--finance        { background:#2a2000; color:#ffd060; }
  #smb-feed .smb-cat--continuity     { background:#3d2000; color:#ffb865; }
  #smb-feed .smb-cat--policy         { background:#2a0a4a; color:#c97aff; }
}
</style>

<script>
(function () {
  'use strict';

  // *** Replace with your Vercel URL (no trailing slash) ***
  const FEED_BASE = 'https://YOUR-SMBIT-PROJECT.vercel.app';

  function pageUrl(n) {
    return n === 1 ? FEED_BASE + '/feed.json' : FEED_BASE + '/feed-' + n + '.json';
  }

  let pageArticles   = [];
  let currentPage    = 1;
  let totalPages     = 1;
  let activeCategory = 'all';
  let searchQuery    = '';

  const listEl    = document.getElementById('smb-list');
  const tabs      = document.querySelectorAll('#smb-tabs .smb-tab');
  const searchEl  = document.getElementById('smb-search');
  const updatedEl = document.getElementById('smb-updated');
  const feedLink  = document.getElementById('smb-feedlink');
  const prevBtn   = document.getElementById('smb-prev');
  const nextBtn   = document.getElementById('smb-next');
  const pageInfo  = document.getElementById('smb-page-info');

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  function fmtDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });
    } catch (_) { return ''; }
  }

  function catLabel(cat) {
    return { cloud_saas: 'Cloud / SaaS', policy: 'Policy & Compliance' }[cat] || cat;
  }

  function render() {
    const q = searchQuery.trim().toLowerCase();
    const visible = pageArticles.filter(a => {
      const catOk    = activeCategory === 'all' || a.category === activeCategory;
      const searchOk = !q ||
        a.title.toLowerCase().includes(q) ||
        (a.summary || '').toLowerCase().includes(q) ||
        a.source.toLowerCase().includes(q);
      return catOk && searchOk;
    });

    if (!visible.length) {
      listEl.innerHTML = '<p class="smb-status">No articles match this filter on this page.</p>';
    } else {
      listEl.innerHTML = visible.map(a => `
        <div class="smb-item">
          <a class="smb-item-title"
             href="${esc(a.url)}" target="_blank"
             rel="noopener noreferrer nofollow">${esc(a.title)}</a>
          <div class="smb-item-meta">
            <span class="smb-source">${esc(a.source)}</span>
            <span aria-hidden="true">·</span>
            <span class="smb-cat smb-cat--${esc(a.category)}">${esc(catLabel(a.category))}</span>
            <span aria-hidden="true">·</span>
            <time datetime="${esc(a.date)}">${fmtDate(a.date)}</time>
          </div>
          ${a.summary ? `<p class="smb-item-summary">${esc(a.summary)}</p>` : ''}
        </div>`).join('');
    }

    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
    pageInfo.textContent = totalPages > 1 ? `Page ${currentPage} of ${totalPages}` : '';
  }

  async function loadPage(n) {
    listEl.innerHTML = '<p class="smb-status">Loading…</p>';
    prevBtn.disabled = true; nextBtn.disabled = true;
    try {
      const res  = await fetch(pageUrl(n), { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      pageArticles = data.articles || [];
      currentPage  = data.page        || n;
      totalPages   = data.total_pages || 1;
      if (data.updated) updatedEl.textContent = 'Last updated ' + fmtDate(data.updated);
      feedLink.href  = pageUrl(1);
      searchEl.value = ''; searchQuery = '';
      render();
      document.getElementById('smb-feed').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (err) {
      listEl.innerHTML = `<p class="smb-status">Could not load feed.<br><small>${esc(String(err))}</small></p>`;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
    }
  }

  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => { x.classList.remove('smb-tab--active'); x.setAttribute('aria-pressed','false'); });
    t.classList.add('smb-tab--active'); t.setAttribute('aria-pressed','true');
    activeCategory = t.dataset.cat; render();
  }));

  let dbt;
  searchEl.addEventListener('input', () => {
    clearTimeout(dbt);
    dbt = setTimeout(() => { searchQuery = searchEl.value; render(); }, 250);
  });

  prevBtn.addEventListener('click', () => { if (currentPage > 1) loadPage(currentPage - 1); });
  nextBtn.addEventListener('click', () => { if (currentPage < totalPages) loadPage(currentPage + 1); });

  loadPage(1);
}());
</script>
