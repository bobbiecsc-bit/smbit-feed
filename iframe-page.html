<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Small Business IT Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Fill the iframe exactly and prevent body-level scroll */
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      background: #0A2342;
      color: #fff;
    }

    /* Outer wrapper fills the iframe, stacks header + scroll area + footer */
    .feed-wrapper {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* ── Sticky header ───────────────────────────────────────── */
    /* flex-shrink:0 keeps it at its natural height, never compressed */
    .feed-header {
      flex-shrink: 0;
      background: #0A2342;
      border-bottom: 2px solid #1C4578;
      padding: 14px 20px 12px;
      z-index: 10;
    }
    .feed-title   { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .feed-subtitle { font-size: 11px; color: #8CCFD1; margin-bottom: 12px; }

    /* ── Tabs ───────────────────────────────────────────────── */
    .feed-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 9px; }
    .feed-tab {
      background: #1C4578; border: 1px solid #497D8D; border-radius: 4px;
      padding: 4px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
      color: #8CCFD1; font-family: inherit; transition: all 0.12s;
    }
    .feed-tab:hover { background: #497D8D; color: #fff; }
    .feed-tab--active { background: #497D8D; border-color: #8CCFD1; color: #fff; }

    /* ── Search ─────────────────────────────────────────────── */
    .feed-search {
      width: 100%; padding: 7px 12px; font-size: 13px; font-family: inherit;
      border: 1px solid #497D8D; border-radius: 4px;
      background: #1C4578; color: #fff; outline: none;
    }
    .feed-search:focus { border-color: #8CCFD1; }
    .feed-search::placeholder { color: #497D8D; }

    /* ── Scrollable article area ─────────────────────────────── */
    /* flex: 1 makes it fill all remaining height; overflow-y makes it scroll */
    .feed-scroll {
      flex: 1;
      overflow-y: auto;
      background: #0A2342;
    }
    /* Custom scrollbar — subtle, on-brand */
    .feed-scroll::-webkit-scrollbar { width: 6px; }
    .feed-scroll::-webkit-scrollbar-track { background: #0A2342; }
    .feed-scroll::-webkit-scrollbar-thumb { background: #497D8D; border-radius: 3px; }
    .feed-scroll::-webkit-scrollbar-thumb:hover { background: #8CCFD1; }

    /* ── Article items ───────────────────────────────────────── */
    #feed-list { padding: 0; }
    .feed-item {
      display: flex; flex-direction: column; gap: 5px;
      padding: 13px 20px; border-bottom: 1px solid #1C4578;
    }
    .feed-item:nth-child(even) { background: #1C4578; }
    .feed-item:nth-child(odd)  { background: #0A2342; }
    .feed-item:last-child { border-bottom: none; }

    .feed-item-title {
      font-size: 14px; font-weight: 600; line-height: 1.4;
      color: #fff; text-decoration: none;
    }
    .feed-item-title:hover { color: #8CCFD1; text-decoration: underline; text-underline-offset: 2px; }
    .feed-item-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; font-size: 11px; }
    .feed-source { font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #497D8D; }
    .feed-meta-dot { color: #497D8D; }
    time { color: #8CCFD1; }

    .feed-item-summary {
      font-size: 12px; color: #8CCFD1; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    /* ── Status message (loading / empty) ────────────────────── */
    .feed-status {
      padding: 40px 20px; text-align: center;
      color: #497D8D; font-size: 13px;
    }

    /* ── Sticky footer: pagination + last-updated ────────────── */
    .feed-footer-bar {
      flex-shrink: 0;
      background: #0A2342;
      border-top: 2px solid #1C4578;
    }
    .feed-pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
    }
    .feed-page-btn {
      background: #1C4578; border: 1px solid #497D8D; border-radius: 4px;
      padding: 6px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
      color: #8CCFD1; font-family: inherit; transition: all 0.12s;
    }
    .feed-page-btn:hover:not(:disabled) { background: #497D8D; border-color: #8CCFD1; color: #fff; }
    .feed-page-btn:disabled { opacity: .3; cursor: default; }
    .feed-page-info { font-size: 12px; color: #497D8D; }
    .feed-meta-line {
      padding: 0 20px 9px;
      font-size: 11px; color: #497D8D;
    }
    .feed-meta-line a { color: #8CCFD1; text-decoration: none; }
    .feed-meta-line a:hover { color: #fff; }

    /* ── Ad slot ────────────────────────────────────────────── */
    .feed-ad {
      flex-shrink: 0;
      padding: 10px 20px; background: #0A2342;
      text-align: center; border-bottom: 1px solid #1C4578;
    }

    /* ── Spinner ─────────────────────────────────────────────── */
    .feed-spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #1C4578; border-top-color: #8CCFD1;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .feed-header, .feed-item, .feed-pagination,
      .feed-meta-line, .feed-ad { padding-left: 14px; padding-right: 14px; }
    }

    /* Category badges — SMB IT */
    .feed-cat {
      display: inline-block; padding: 1px 7px; border-radius: 3px;
      font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
    }
    .feed-cat--infrastructure { background: rgba(26,95,176,0.3);  color: #7aadff; border: 1px solid rgba(26,95,176,0.5); }
    .feed-cat--cloud_saas     { background: rgba(26,122,70,0.3);  color: #5adba0; border: 1px solid rgba(26,122,70,0.5); }
    .feed-cat--finance        { background: rgba(122,96,0,0.3);   color: #ffd060; border: 1px solid rgba(122,96,0,0.5); }
    .feed-cat--continuity     { background: rgba(154,80,0,0.3);   color: #ffb865; border: 1px solid rgba(154,80,0,0.5); }
    .feed-cat--policy         { background: rgba(106,10,173,0.3); color: #c97aff; border: 1px solid rgba(106,10,173,0.5); }
    .feed-cat--product_review { background: rgba(0,140,130,0.3);  color: #5de8d8; border: 1px solid rgba(0,140,130,0.5); }
  </style>
</head>
<body>

<div class="feed-wrapper">

  <!-- <div class="feed-ad">YOUR AD CODE HERE</div> -->

  <!-- STICKY HEADER -->
  <div class="feed-header">
    <div class="feed-title">Small Business IT</div>
    <div class="feed-subtitle">Practical technology news for small &amp; family businesses · Updated twice daily</div>
    <div class="feed-tabs" id="feed-tabs" role="tablist">
      <button class="feed-tab feed-tab--active" data-cat="all"            role="tab" aria-pressed="true">All</button>
      <button class="feed-tab"                   data-cat="product_review" role="tab" aria-pressed="false">Product Reviews</button>
      <button class="feed-tab"                   data-cat="infrastructure" role="tab" aria-pressed="false">Infrastructure</button>
      <button class="feed-tab"                   data-cat="cloud_saas"     role="tab" aria-pressed="false">Cloud &amp; SaaS</button>
      <button class="feed-tab"                   data-cat="finance"        role="tab" aria-pressed="false">Budgeting</button>
      <button class="feed-tab"                   data-cat="continuity"     role="tab" aria-pressed="false">Continuity / DR</button>
      <button class="feed-tab"                   data-cat="policy"         role="tab" aria-pressed="false">Policy &amp; Compliance</button>
    </div>
    <input id="feed-search" class="feed-search" type="search"
           placeholder="Search articles…" aria-label="Search small business IT news" />
  </div>

  <!-- SCROLLABLE ARTICLE AREA -->
  <div class="feed-scroll">
    <div id="feed-list">
      <div class="feed-status"><span class="feed-spinner"></span>Loading…</div>
    </div>
  </div>

  <!-- STICKY FOOTER -->
  <div class="feed-footer-bar">
    <div class="feed-pagination">
      <button class="feed-page-btn" id="feed-prev" disabled>← Previous</button>
      <span class="feed-page-info" id="feed-page-info"></span>
      <button class="feed-page-btn" id="feed-next" disabled>Next →</button>
    </div>
    <div class="feed-meta-line">
      <span id="feed-updated"></span> &nbsp;·&nbsp;
      <a id="feed-link" href="#" target="_blank" rel="noopener noreferrer">Feed source</a>
      &nbsp;·&nbsp; Links open the original article on the source site.
    </div>
  </div>

</div>

  <script>
  (function () {
    'use strict';
    const FEED_BASE = 'https://smbit-feed.vercel.app';
    function pageUrl(n) { return n === 1 ? FEED_BASE + '/feed.json' : FEED_BASE + '/feed-' + n + '.json'; }

    let articles = [], currentPage = 1, totalPages = 1, activeCategory = 'all', searchQuery = '';
    const listEl    = document.getElementById('feed-list');
    const scrollEl  = document.querySelector('.feed-scroll');
    const tabs      = document.querySelectorAll('#feed-tabs .feed-tab');
    const searchEl  = document.getElementById('feed-search');
    const updatedEl = document.getElementById('feed-updated');
    const feedLink  = document.getElementById('feed-link');
    const prevBtn   = document.getElementById('feed-prev');
    const nextBtn   = document.getElementById('feed-next');
    const pageInfo  = document.getElementById('feed-page-info');

    function esc(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
    function fmtDate(iso) {
      try { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
      catch (_) { return ''; }
    }
    function catLabel(c) { return { cloud_saas: 'Cloud / SaaS', policy: 'Policy & Compliance', product_review: 'Product Review' }[c] || c; }

    function render() {
      const q = searchQuery.trim().toLowerCase();
      const visible = articles.filter(a => {
        const catOk    = activeCategory === 'all' || a.category === activeCategory;
        const searchOk = !q || a.title.toLowerCase().includes(q) ||
          (a.summary || '').toLowerCase().includes(q) || a.source.toLowerCase().includes(q);
        return catOk && searchOk;
      });
      if (!visible.length) {
        listEl.innerHTML = '<div class="feed-status">No articles match this filter on this page.</div>';
      } else {
        listEl.innerHTML = visible.map(a => `
          <div class="feed-item">
            <a class="feed-item-title" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer nofollow">${esc(a.title)}</a>
            <div class="feed-item-meta">
              <span class="feed-source">${esc(a.source)}</span>
              <span class="feed-meta-dot">·</span>
              <span class="feed-cat feed-cat--${esc(a.category)}">${esc(catLabel(a.category))}</span>
              <span class="feed-meta-dot">·</span>
              <time datetime="${esc(a.date)}">${fmtDate(a.date)}</time>
            </div>
            ${a.summary ? `<p class="feed-item-summary">${esc(a.summary)}</p>` : ''}
          </div>`).join('');
      }
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
      pageInfo.textContent = totalPages > 1 ? `Page ${currentPage} of ${totalPages}` : '';
    }

    async function loadPage(n) {
      listEl.innerHTML = '<div class="feed-status"><span class="feed-spinner"></span>Loading…</div>';
      prevBtn.disabled = true; nextBtn.disabled = true;
      try {
        const res  = await fetch(pageUrl(n), { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        articles = data.articles || []; currentPage = data.page || n; totalPages = data.total_pages || 1;
        if (data.updated) updatedEl.textContent = 'Last updated ' + fmtDate(data.updated);
        feedLink.href = pageUrl(1); searchEl.value = ''; searchQuery = '';
        scrollEl.scrollTop = 0;
        render();
      } catch (err) {
        listEl.innerHTML = `<div class="feed-status">Could not load feed.<br>
          <small style="opacity:.6">${esc(String(err))}</small></div>`;
        prevBtn.disabled = currentPage <= 1; nextBtn.disabled = currentPage >= totalPages;
      }
    }

    tabs.forEach(tab => tab.addEventListener('click', () => {
      tabs.forEach(t => { t.classList.remove('feed-tab--active'); t.setAttribute('aria-pressed','false'); });
      tab.classList.add('feed-tab--active'); tab.setAttribute('aria-pressed','true');
      activeCategory = tab.dataset.cat; scrollEl.scrollTop = 0; render();
    }));
    let dbt;
    searchEl.addEventListener('input', () => { clearTimeout(dbt); dbt = setTimeout(() => { searchQuery = searchEl.value; render(); }, 250); });
    prevBtn.addEventListener('click', () => { if (currentPage > 1) loadPage(currentPage - 1); });
    nextBtn.addEventListener('click', () => { if (currentPage < totalPages) loadPage(currentPage + 1); });
    loadPage(1);
  }());
  </script>
</body>
</html>
